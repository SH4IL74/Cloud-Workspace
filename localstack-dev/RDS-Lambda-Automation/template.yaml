AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: S3 Triggered Currency Converter

Resources:
  # 1. The S3 Bucket
  BillingBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: my-billing-bucket-shail

  # 2. The Lambda Function
  CurrencyConverterFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: lambda_function.lambda_handler
      Runtime: python3.9
      CodeUri: ./src
      MemorySize: 128
      Timeout: 30
      Policies:
        - S3ReadPolicy:
            BucketName: my-billing-bucket-shail
      Events:
        # 3. The Trigger (Connecting them)
        FileUploadEvent:
          Type: S3
          Properties:
            Bucket: !Ref BillingBucket
            Events: s3:ObjectCreated:*
            Filter:
              S3Key:
                Rules:
                  - Name: suffix
                    Value: .csv