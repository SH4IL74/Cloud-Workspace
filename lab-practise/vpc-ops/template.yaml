AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: SAM Template for cleaning up unassociated Elastic IPs in AWS/LocalStack.

Globals:
  Function:
    Timeout: 30
    MemorySize: 128
    Runtime: python3.12

Resources:
  CleanupElasticIPsFunction:
    Type: AWS::Serverless::Function
    Properties:
      # Points to the directory where your app.py is located
      CodeUri: .
      Handler: lambda_function.lambda_handler
      Description: Identifies and releases unassociated Elastic IPs.
      Environment:
        Variables:
          # When running inside SAM Docker container, point to the host machine's LocalStack
          LOCALSTACK_ENDPOINT: "http://host.docker.internal:4566"
          REGION_NAME: "ap-south-1"
          AWS_ACCESS_KEY_ID: "test"
          AWS_SECRET_ACCESS_KEY: "test"
      Policies:
        # IAM policy allowing EC2 Elastic IP operations when deployed to AWS
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - ec2:DescribeAddresses
                - ec2:ReleaseAddress
              Resource: '*'

Outputs:
  CleanupElasticIPsFunctionArn:
    Description: "Elastic IP Cleanup Lambda Function ARN"
    Value: !GetAtt CleanupElasticIPsFunction.Arn