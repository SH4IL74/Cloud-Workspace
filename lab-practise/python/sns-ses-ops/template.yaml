AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: SAM Template for Processing Billing CSV Files

Resources:
  # 1. Source S3 Bucket
  SourceBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: my-source-bucket

  # 2. Processed S3 Bucket
  ProcessedBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: my-processed-bucket

  # 3. SNS Topic for Alerts
  TaxesSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: TaxesAPIConnectionError

  # 4. Lambda Function
  ProcessBillingCSVFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ProcessBillingCSV
      CodeUri: ./
      Handler: lambda_function.lambda_handler # Adjust filename if not lambda_function.py
      Runtime: python3.11
      Timeout: 30
      Policies:
        - AmazonS3FullAccess
        - AmazonSNSFullAccess
        - AmazonSESFullAccess