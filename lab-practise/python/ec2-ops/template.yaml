AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Resources:
  EC2LambdaAutomation:
    Type: AWS::Serverless::Function
    Properties:
      # Fix 1: Points to the current directory where your files live
      CodeUri: ./
      Handler: lambda_function.lambda_handler
      Runtime: python3.12
      Timeout: 15
      Architectures:
        - x86_64
      Environment:
        Variables:
          # Fix 2: The standard, fully-qualified endpoint variable for your Boto3 script
          LOCALSTACK_ENDPOINT: "http://host.docker.internal:4566"
          