name: Private Cloud Deployment & Integration Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python Dependencies
        run: |
          cd private-cloud
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start LocalStack via Docker Compose
        run: |
          cd private-cloud
          docker-compose up -d
          echo "Waiting 20 seconds for LocalStack container to initialize..."
          sleep 20

      - name: Provision Private Cloud Infrastructure
        env:
          AWS_ENDPOINT_URL: "http://localhost:4566"
          AWS_DEFAULT_REGION: "ap-south-1"
          AWS_ACCESS_KEY_ID: "test"
          AWS_SECRET_ACCESS_KEY: "test"
        run: |
          cd private-cloud
          python deploy.py

      - name: Verify Infrastructure Deployment
        env:
          AWS_ENDPOINT_URL: "http://localhost:4566"
          AWS_DEFAULT_REGION: "ap-south-1"
          AWS_ACCESS_KEY_ID: "test"
          AWS_SECRET_ACCESS_KEY: "test"
        run: |
          cd private-cloud
          python verify_stack.py

      - name: Teardown Cloud Infrastructure
        if: always()
        env:
          AWS_ENDPOINT_URL: "http://localhost:4566"
          AWS_DEFAULT_REGION: "ap-south-1"
          AWS_ACCESS_KEY_ID: "test"
          AWS_SECRET_ACCESS_KEY: "test"
        run: |
          cd private-cloud
          python destroy.py