# .github/workflows/deploy.yml
name: Private Cloud Deployment & Integration Tests

# Trigger workflow on every push or pull request to the main branch
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository code
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      # 2. Set up Python environment
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 3. Cache Python dependencies (speeds up workflow execution)
      - name: Cache Pip Packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # 4. Install dependencies
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 5. Start LocalStack using Docker Compose
      - name: Start LocalStack Services
        run: |
          docker-compose up -d
          # Wait for LocalStack health check to pass (port 4566 ready)
          echo "Waiting for LocalStack gateway to start..."
          until curl -s http://localhost:4566/_localstack/health | grep -q '"s3": "available"\|"s3": "running"'; do
            sleep 2
          done
          echo "✅ LocalStack is fully operational!"

      # 6. Execute Master Deployment Script
      - name: Provision Private Cloud Infrastructure
        env:
          AWS_ENDPOINT_URL: "http://localhost:4566"
          AWS_DEFAULT_REGION: "ap-south-1"
          AWS_ACCESS_KEY_ID: "test"
          AWS_SECRET_ACCESS_KEY: "test"
        run: |
          python deploy.py

      # 7. Run Infrastructure Audit / Verification Test
      - name: Verify Infrastructure Deployment
        env:
          AWS_ENDPOINT_URL: "http://localhost:4566"
          AWS_DEFAULT_REGION: "ap-south-1"
          AWS_ACCESS_KEY_ID: "test"
          AWS_SECRET_ACCESS_KEY: "test"
        run: |
          python verify_stack.py

      # 8. Clean up resources
      - name: Teardown Cloud Infrastructure
        if: always() # Runs even if previous steps fail
        env:
          AWS_ENDPOINT_URL: "http://localhost:4566"
          AWS_DEFAULT_REGION: "ap-south-1"
          AWS_ACCESS_KEY_ID: "test"
          AWS_SECRET_ACCESS_KEY: "test"
        run: |
          python destroy.py