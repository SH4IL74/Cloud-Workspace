name: Private Cloud Deployment & Integration Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python Dependencies
        working-directory: private-cloud
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start LocalStack
        uses: LocalStack/setup-localstack@v0.3.2
        with:
          image-tag: 'latest'
          install-awslocal: 'true'

      - name: Provision Private Cloud Infrastructure
        working-directory: private-cloud
        env:
          AWS_ENDPOINT_URL: "http://localhost:4566"
          AWS_DEFAULT_REGION: "ap-south-1"
          AWS_ACCESS_KEY_ID: "test"
          AWS_SECRET_ACCESS_KEY: "test"
        run: |
          python deploy.py

      - name: Verify Infrastructure Deployment
        working-directory: private-cloud
        env:
          AWS_ENDPOINT_URL: "http://localhost:4566"
          AWS_DEFAULT_REGION: "ap-south-1"
          AWS_ACCESS_KEY_ID: "test"
          AWS_SECRET_ACCESS_KEY: "test"
        run: |
          python verify_stack.py

      - name: Teardown Cloud Infrastructure
        if: always()
        working-directory: private-cloud
        env:
          AWS_ENDPOINT_URL: "http://localhost:4566"
          AWS_DEFAULT_REGION: "ap-south-1"
          AWS_ACCESS_KEY_ID: "test"
          AWS_SECRET_ACCESS_KEY: "test"
        run: |
          python destroy.py