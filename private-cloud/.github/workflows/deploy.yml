name: Private Cloud Deployment & Integration Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
        working-directory: private-cloud

      - name: Start LocalStack via Docker Compose
        run: |
          docker-compose up -d
          echo "Waiting 15 seconds for LocalStack..."
          sleep 15
        working-directory: private-cloud

      - name: Provision Private Cloud Infrastructure
        env:
          AWS_ENDPOINT_URL: "http://localhost:4566"
          AWS_DEFAULT_REGION: "ap-south-1"
          AWS_ACCESS_KEY_ID: "test"
          AWS_SECRET_ACCESS_KEY: "test"
        run: python deploy.py
        working-directory: private-cloud

      - name: Verify Infrastructure Deployment
        env:
          AWS_ENDPOINT_URL: "http://localhost:4566"
          AWS_DEFAULT_REGION: "ap-south-1"
          AWS_ACCESS_KEY_ID: "test"
          AWS_SECRET_ACCESS_KEY: "test"
        run: python verify_stack.py
        working-directory: private-cloud

      - name: Teardown Cloud Infrastructure
        if: always()
        env:
          AWS_ENDPOINT_URL: "http://localhost:4566"
          AWS_DEFAULT_REGION: "ap-south-1"
          AWS_ACCESS_KEY_ID: "test"
          AWS_SECRET_ACCESS_KEY: "test"
        run: python destroy.py
        working-directory: private-cloud